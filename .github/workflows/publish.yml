name: Publish to npm

on:
  push:
    branches: [main, test/publish-pipeline]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx vitest run

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build

      - name: Check if version already published
        id: version-check
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version 2>/dev/null || true)
          if [ "$PUBLISHED" = "$PACKAGE_VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version ${PACKAGE_VERSION} already published, skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Version ${PACKAGE_VERSION} not yet published."
          fi

      - name: Debug OIDC token claims
        if: steps.version-check.outputs.skip != 'true'
        run: |
          echo "Ref: $GITHUB_REF"
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Workflow: $GITHUB_WORKFLOW"
          echo "Actor: $GITHUB_ACTOR"
          echo "Registry URL from npmrc:"
          cat ~/.npmrc || true
          npm whoami 2>&1 || echo "npm whoami failed (expected without token)"

      - name: Publish to npm
        if: steps.version-check.outputs.skip != 'true'
        run: npm publish --provenance --access public
